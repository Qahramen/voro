server {
    server_name voro.uz www.voro.uz;
    client_max_body_size 60m;

    root /var/www/voro;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8788/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /vagent/ {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 900s;
        add_header X-Accel-Buffering no;
    }

    location /uploads/ { alias /opt/voro-web/uploads/; }
    location /media/   { alias /opt/voro-web/media/; expires 7d; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/voro.uz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/voro.uz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.voro.uz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = voro.uz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name voro.uz www.voro.uz;
    return 404; # managed by Certbot




}