<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070809">
<title>Voro — AI ijod studiyasi</title>
<meta name="description" content="Seedance, Veo, Kling, GPT Image — 28 ta AI model bitta saytda. Video va rasm yarating.">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#070809; overflow-x:hidden; }
  #root { min-height:100vh; }
</style>
<!-- Voro UI tuzatishlar (bug-fix) -->
<style>
/* 1) Logotip V-badge: haddan tashqari qo'pol 14px qora drop-shadow'ni yumshoq soyaga
      almashtiramiz (oq highlight va cyan ichki nur saqlanadi). */
.hwrap button.tap > div[style*="rgb(38, 38, 44)"]{
  box-shadow: 0 2px 6px rgba(0,0,0,.35),
              rgba(255,255,255,.18) 0 1px 0 inset,
              rgba(43,212,255,.30) 0 -6px 12px inset !important;
}
/* 2) Logotip tugmasiga HOVER'da chiqadigan TO'RTBURCHAK qora soyani olib tashlaymiz.
      Tugma border-radius:0 (o'tkir to'rtburchak) bo'lgani uchun hover box-shadow
      logotip ortida qora to'rtburchak halo bo'lib ko'rinardi. Logo uchun keraksiz. */
.hwrap button.tap:has(> div[style*="rgb(38, 38, 44)"]):hover{
  box-shadow: none !important;
}
</style>
</head>

(function(){

    or.style.cssText="font-size:12px;opacity:.55";

    var emailInp=col.querySelector('input[type="email"],input[name="email"],input[placeholder*="mail" i]');
    var anchor=col.firstChild;
    if(emailInp){ var ew=emailInp.closest("div"); if(ew&&ew.parentElement===col) anchor=ew; }

    try{ google.accounts.id.renderButton(host,{theme:"outline",size:"large",width:300,text:"continue_with",shape:"pill"}); }catch(e){}
  }
  var _prompted=false;

    // Canva uslubi: sayt ochilishida login qilmagan foydalanuvchiga One Tap

    fetch(API+"/me",{credentials:"include"}).then(function(r){
      if(r.status===401){ _prompted=true; try{ google.accounts.id.prompt(); }catch(e){} }
    }).catch(function(){});
    var obs=new MutationObserver(function(){
      var pw=document.querySelector('input[type="password"]');
      if(pw){
        makeBtn(pw);
        // Login modal ochilganda: hisob tanlash sahifa USTIDA overlay karta sifatida
        // chiqadi (FedCM) — modal yopilmaydi, sahifa almashmaydi.
        if(!_prompted){ _prompted=true; try{ google.accounts.id.prompt(); }catch(e){} }
      }
      else {
        var ex=document.getElementById("voro-gbtn"); if(ex){ ex.remove(); }
        _prompted=false;   // modal yopildi — keyingi ochilishda yana ko'rsatiladi
      }
    });
    obs.observe(document.body,{childList:true,subtree:true});
  });
})();

/* Yuklanish qatlami — reference BOX ichida, chiqib keta olmaydi */
.voroRefLoad{position:absolute;inset:0;z-index:6;border-radius:inherit;overflow:hidden;display:grid;place-items:center;
  background:rgba(9,10,13,.45);opacity:0;transition:opacity .2s ease;pointer-events:none}
.voroRefLoad.in{opacity:1}
.voroRefLoad .vbg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(9px) saturate(.55) brightness(.6);transform:scale(1.15)}
.voroRefLoad .vshine{position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.16) 50%,transparent 70%);background-size:220% 100%;animation:voroRefShimmer 1.3s ease-in-out infinite}
.voroRefLoad .vring{position:relative;z-index:2;filter:drop-shadow(0 1px 4px rgba(0,0,0,.55))}
/* Reveal — haqiqiy preview mount bo'lganda (JS class qo'shadi, o'lchamdan qat'i nazar) */
.voroRefIn{animation:voroRefReveal .5s cubic-bezier(.32,.72,0,1) both}
.voroRefImgIn{animation:voroRefImg .55s cubic-bezier(.32,.72,0,1) both}
</style>
<script>
(function(){
  "use strict";
  if(window.__voroRefUX)return; window.__voroRefUX=true;
  var ACCENT="#2BD4FF", R=15, C=2*Math.PI*R;
  function ringSvg(sz){
    return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 42 42">'
      +'<circle cx="21" cy="21" r="'+R+'" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="3"/>'
      +'<circle class="voroRefProg" cx="21" cy="21" r="'+R+'" fill="none" stroke="'+ACCENT+'" stroke-width="3" '
      +'stroke-linecap="round" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+C.toFixed(1)+'" transform="rotate(-90 21 21)"/></svg>';
  }
  function reveal(rp){
    try{ rp.classList.add("voroRefImgIn"); var c=rp.closest("div"); if(c) c.classList.add("voroRefIn"); }catch(e){}
  }
  function startLoad(panel, frame, url, doRevoke){
    try{ if(frame.querySelector(".voroRefLoad"))return; }catch(e){}
    try{ if(getComputedStyle(frame).position==="static") frame.style.position="relative"; }catch(e){}
    var sz=frame.getBoundingClientRect().width||64;
    var rsz=Math.max(24,Math.min(38,Math.round(sz*0.52)));
    var layer=document.createElement("div"); layer.className="voroRefLoad";
    layer.innerHTML='<div class="vbg"></div><div class="vshine"></div><div class="vring">'+ringSvg(rsz)+'</div>';
    try{ layer.querySelector(".vbg").style.backgroundImage='url("'+url+'")'; }catch(e){}
    frame.appendChild(layer);
    requestAnimationFrame(function(){ layer.classList.add("in"); });

    var prog=layer.querySelector(".voroRefProg"), p=0, done=false, to;
    function setRing(v){ try{ prog.setAttribute("stroke-dashoffset",(C*(1-v/100)).toFixed(1)); }catch(e){} }
    function ptick(){ if(done)return; p+=(92-p)*0.045; setRing(p); requestAnimationFrame(ptick); }
    ptick();

    var seen={};
    try{ [].slice.call(panel.querySelectorAll("img")).forEach(function(im){var s=im.currentSrc||im.getAttribute("src")||""; if(/^https?:/.test(s)) seen[s]=1;}); }catch(e){}
    function real(){ try{ return [].slice.call(panel.querySelectorAll("img")).filter(function(im){var s=im.currentSrc||im.getAttribute("src")||""; return /^https?:/.test(s)&&!seen[s];})[0]; }catch(e){ return null; } }
    function cleanup(){ try{layer.remove();}catch(e){} try{obs.disconnect();}catch(e){} if(doRevoke){try{URL.revokeObjectURL(url);}catch(e){}} clearTimeout(to); }
    function finish(){ if(done)return; done=true; setRing(100); var rp=real(); if(rp) reveal(rp); layer.classList.remove("in"); setTimeout(cleanup,240); }
    var obs=new MutationObserver(function(){ if(real()) finish(); });
    try{ obs.observe(panel,{childList:true,subtree:true,attributes:true,attributeFilter:["src"]}); }catch(e){}
    to=setTimeout(function(){ if(!done){ layer.classList.remove("in"); setTimeout(cleanup,240); } }, 45000);
    if(real()) finish();
    return {finish:finish, cleanup:cleanup};
  }
  function frameOf(panel){
    // Reference "box": panel ichidagi kichik ~kvadrat tugma (rasm-siz). Bo'lmasa panel.
    try{
      var btns=[].slice.call(panel.querySelectorAll("button")).filter(function(b){
        if(b.querySelector("img"))return false;
        var r=b.getBoundingClientRect(), w=r.width, h=r.height;
        if(w<36||h<36||w>220||h>220)return false;
        var ar=w/h; return ar>0.72 && ar<1.4;
      });
      btns.sort(function(a,b){ return a.getBoundingClientRect().width - b.getBoundingClientRect().width; });
      if(btns[0]) return btns[0];
    }catch(e){}
    return panel;
  }
  document.addEventListener("change", function(e){
    try{
      var inp=e.target;
      if(!inp||inp.tagName!=="INPUT"||inp.type!=="file")return;
      if(!/image/i.test(inp.accept||""))return;
      var f=inp.files&&inp.files[0];
      if(!f||!/^image\//.test(f.type||""))return;
      var panel=inp.closest(".panel")||inp.parentElement; if(!panel)return;
      var url; try{url=URL.createObjectURL(f);}catch(e2){return;}
      startLoad(panel, frameOf(panel), url, true);
    }catch(err){}
  }, true);

  // Demo (haqiqiy yuklashsiz ko'rish uchun) — 64x64 box
  window.__voroRefDemo=function(imgUrl){
    imgUrl=imgUrl||(document.querySelector("img")&&document.querySelector("img").src);
    var panel=document.createElement("div"); panel.className="panel";
    panel.style.cssText="position:fixed;left:70px;top:170px;width:300px;z-index:99991;padding:16px;background:#12141a;border-radius:16px;border:1px solid rgba(255,255,255,.08)";
    var lbl=document.createElement("div"); lbl.textContent="REFERENCE IMAGE"; lbl.style.cssText="font-size:12px;color:#8b93a3;margin-bottom:12px;font-weight:700;letter-spacing:.6px"; panel.appendChild(lbl);
    var row=document.createElement("div"); row.style.cssText="display:flex;gap:10px"; panel.appendChild(row);
    var frame=document.createElement("button"); frame.className="tap";
    frame.style.cssText="width:64px;height:64px;border-radius:13px;background:#1b1e26;border:1px dashed rgba(255,255,255,.15);color:#5b6472;font-size:22px;display:grid;place-items:center";
    frame.textContent="+"; row.appendChild(frame); document.body.appendChild(panel);
    startLoad(panel, frame, imgUrl, false);
    setTimeout(function(){
      frame.textContent="";
      var c=document.createElement("div");
      c.setAttribute("style","position:relative;width:64px;height:64px;border-radius:13px;overflow:hidden;background:#000");
      var im=document.createElement("img"); im.src=imgUrl; im.setAttribute("style","width:100%;height:100%;object-fit:cover");
      c.appendChild(im); frame.appendChild(c);
    }, 2000);
    setTimeout(function(){ try{panel.remove();}catch(e){} }, 5200);
    return "demo boshlandi";
  };
})();
</script>
<!-- Voro Vagent — sayt ichida (iframe overlay, sahifa almashmaydi) -->
<script>
(function(){
  var ICON16='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="12" rx="3"/><circle cx="9" cy="14" r="1.2" fill="currentColor" stroke="none"/><circle cx="15" cy="14" r="1.2" fill="currentColor" stroke="none"/><path d="M12 8V4.5M8.5 4.5h7"/></svg>';
  var overlay=null, frame=null, linkUrl=null, loading=false, shown=false;

  function ensureOverlay(){
    if(overlay) return overlay;
    overlay=document.createElement("div");
    overlay.id="voro-vagent-overlay";
    overlay.style.cssText="position:fixed;left:0;right:0;z-index:35;display:none;background:#070809;";
    frame=document.createElement("iframe");
    frame.id="voro-vagent-frame";
    frame.setAttribute("allow","microphone; clipboard-write");
    frame.setAttribute("title","Vagent");
    frame.style.cssText="width:100%;max-width:1240px;height:100%;border:0;display:block;margin:0 auto;background:#070809;";
    overlay.appendChild(frame);
    document.body.appendChild(overlay);
    window.addEventListener("resize",position);
    return overlay;
  }
  function calcPadb(){
    var dock=document.querySelector("nav.dock");
    if(!dock) return 0;
    var dr=dock.getBoundingClientRect();
    return Math.max(0,Math.round(window.innerHeight-dr.top)+14);
  }
  function position(){
    if(!overlay) return;
    var nav=document.querySelector("nav.top-nav");
    var wrap=nav?(nav.closest("header")||nav.parentElement):null;
    var top=wrap?Math.round(wrap.getBoundingClientRect().bottom):56;
    overlay.style.top=top+"px";
    overlay.style.bottom="0px";           // fon pastgacha yopadi
    var padb=calcPadb();                  // composer'ni dock ustiga surish
    if(frame&&frame.contentWindow){ try{ frame.contentWindow.postMessage({t:"vgpadb",v:padb},"*"); }catch(e){} }
  }
  function setActive(on){
    var b=document.getElementById("voro-vnav");
    if(!b) return;
    if(on){ b.style.color="#2BD4FF"; b.style.background="rgba(43,212,255,0.12)"; b.style.boxShadow="rgba(43,212,255,0.22) 0px 0px 0px 1px inset"; }
    else { b.style.color=""; b.style.background=""; b.style.boxShadow=""; }
  }
  function show(){
    ensureOverlay(); position();
    overlay.style.display="block"; shown=true; setActive(true);
    // sahifa orqa fonda surilmasin/sakramasin (React'ni buzmaydigan xavfsiz usul)
    document.body.style.overflow="hidden";
    document.body.style.overscrollBehavior="none";
    document.documentElement.style.overscrollBehavior="none";
  }
  function hide(){
    if(overlay) overlay.style.display="none";
    shown=false; setActive(false);
    document.body.style.overflow="";
    document.body.style.overscrollBehavior="";
    document.documentElement.style.overscrollBehavior="";
  }
  function openVagent(){
    if(linkUrl){ show(); return; }
    if(loading) return; loading=true;
    fetch("/api/vagent-link",{credentials:"include"}).then(function(r){return r.json();}).then(function(d){
      loading=false;
      if(d&&d.url){ linkUrl=d.url+(d.url.indexOf("?")>=0?"&":"?")+"embed=1&padb="+calcPadb(); ensureOverlay(); frame.src=linkUrl; show(); }
      else { alert("Vagent — avval saytga kiring (Sign in)."); }
    }).catch(function(){ loading=false; alert("Vagent — avval saytga kiring (Sign in)."); });
  }

  function addNav(){
    try{
      var nav=document.querySelector("nav.top-nav");
      if(nav && !document.getElementById("voro-vnav")){
        var tpl=[].slice.call(nav.querySelectorAll("button.tap")).pop();
        var b=document.createElement("button");
        b.id="voro-vnav"; b.className="tap"; b.type="button";
        if(tpl) b.setAttribute("style", tpl.getAttribute("style")||"");
        b.innerHTML=ICON16+'<span class="hide-xs">Vagent</span>';
        b.onclick=function(e){ e.preventDefault(); e.stopPropagation(); openVagent(); };
        nav.appendChild(b);
      }
    }catch(e){}
  }

  // Boshqa nav/dock/brand tugmasi bosilsa Vagent yopiladi (saytga qaytadi)
  document.addEventListener("click",function(e){
    if(!shown) return;
    var b=e.target.closest ? e.target.closest("button") : null;
    if(!b) return;
    if(b.id==="voro-vnav") return;
    if(b.classList.contains("tap")||b.classList.contains("dock-item")) hide();
  }, true);

  var obs=new MutationObserver(addNav);
  obs.observe(document.body,{childList:true,subtree:true});
  addNav();
})();
</script>
</body>
</html>
